<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oppas Planner</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --card: #ffffff;
        --line: #d8dee8;
        --accent: #0057ff;
        --ok: #dff5e5;
        --open: #fde7e7;
        --text: #1f2a37;
        --muted: #5b6472;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrapper {
        max-width: 1100px;
        margin: 2rem auto;
        padding: 0 1rem 2rem;
      }

      .header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: flex-end;
        margin-bottom: 1rem;
      }

      .title h1 { margin: 0; font-size: 1.8rem; }
      .title p { margin: .35rem 0 0; color: var(--muted); }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(130px, 1fr));
        gap: .65rem;
      }

      .stat {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: .7rem .8rem;
      }
      .stat small { color: var(--muted); display:block; }
      .stat strong { font-size: 1.15rem; }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: .6rem;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: .8rem;
        margin-bottom: 1rem;
        align-items: end;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: .25rem;
      }

      select, button, input {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: .45rem .6rem;
        background: #fff;
        font: inherit;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
      }

      .ghost-btn {
        background: #fff;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .edit-mode-active {
        background: #1348bd;
      }

      .table-wrap {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: auto;
      }

      table { width: 100%; border-collapse: collapse; min-width: 700px; }

      th, td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: .65rem .7rem;
        font-size: .94rem;
        vertical-align: top;
      }

      th {
        font-size: .82rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .02em;
        position: sticky;
        top: 0;
        background: #f7f9fc;
      }

      .status { border-radius: 999px; padding: .2rem .55rem; font-size: .8rem; font-weight: 700; }
      .status.open { background: var(--open); color: #992a2a; }
      .status.done { background: var(--ok); color: #15643c; }
      .notes { color: var(--muted); }

      .edit-input,
      .edit-select {
        width: 100%;
        min-width: 120px;
      }

      .delete-btn {
        background: #c53535;
        color: #fff;
        padding: .35rem .5rem;
      }

      .mode-hint {
        color: var(--muted);
        font-size: .85rem;
        margin-left: .2rem;
      }

      .hidden {
        display: none;
      }

      .sync-actions {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        display: flex;
        gap: .5rem;
        z-index: 20;
      }

      .sync-actions button[disabled] {
        opacity: .55;
        cursor: not-allowed;
      }

      .signin-success {
        background: #15643c;
      }

      .dialog-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(20, 28, 42, 0.48);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        z-index: 40;
      }

      .dialog-backdrop.open {
        display: flex;
      }

      .dialog {
        width: min(700px, 100%);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(16, 24, 40, 0.2);
        padding: 1rem;
      }

      .dialog h3 {
        margin: 0 0 .5rem 0;
      }

      .dialog p {
        margin: 0 0 .65rem 0;
      }

      .dialog pre {
        background: #f6f8fb;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: .65rem;
        margin: 0;
        max-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .dialog-actions {
        margin-top: .8rem;
        display: flex;
        justify-content: flex-end;
      }

      @media (max-width: 768px) {
        .wrapper {
          margin: .75rem auto;
          padding: 0 .65rem 1rem;
        }

        .header {
          flex-direction: column;
          align-items: stretch;
        }

        .title h1 {
          font-size: 1.45rem;
        }

        .stats {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .controls {
          display: grid;
          grid-template-columns: 1fr 1fr;
          align-items: stretch;
          gap: .65rem;
          padding: .75rem;
        }

        .controls label,
        .controls button,
        .mode-hint {
          width: 100%;
        }

        select,
        button,
        input {
          min-height: 44px;
        }

        .mode-hint {
          grid-column: 1 / -1;
          margin-left: 0;
        }

        .table-wrap {
          border: none;
          background: transparent;
        }

        table,
        tbody,
        tr,
        td {
          display: block;
          width: 100%;
        }

        table {
          min-width: 0;
          border-collapse: separate;
          border-spacing: 0 .55rem;
        }

        thead {
          display: none;
        }

        tr {
          background: var(--card);
          border: 1px solid var(--line);
          border-radius: 12px;
          padding: .35rem .75rem;
        }

        td {
          border-bottom: 1px dashed var(--line);
          padding: .55rem 0;
          display: flex;
          justify-content: space-between;
          gap: .75rem;
          align-items: center;
        }

        td::before {
          content: attr(data-label);
          font-size: .74rem;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: .03em;
          font-weight: 600;
          flex-shrink: 0;
        }

        td:last-child {
          border-bottom: none;
        }

        .edit-input,
        .edit-select {
          min-width: 0;
          max-width: 66%;
        }

        .notes {
          text-align: right;
          max-width: 66%;
        }

        .sync-actions {
          right: .65rem;
          bottom: .65rem;
          flex-direction: column;
          width: min(68vw, 250px);
        }
      }

      @media (max-width: 560px) {
        .controls {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: .45rem;
        }

        .stat {
          padding: .55rem .6rem;
        }

        .stat strong {
          font-size: 1rem;
        }

        td {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <div class="title">
          <h1>Oppas Planner</h1>
          <p>HTML recreation of your Google Sheet planning app.</p>
        </div>
        <div class="stats" id="stats"></div>
      </div>

      <div class="controls">
        <label>
          Status
          <select id="statusFilter">
            <option value="all">All</option>
            <option value="open">Open</option>
            <option value="done">Regeld</option>
          </select>
        </label>

        <label>
          Oppas
          <select id="sitterFilter">
            <option value="all">All</option>
          </select>
        </label>

        <button id="resetBtn" class="ghost-btn">Reset filters</button>
        <button id="togglePastBtn" class="ghost-btn">Show past dates</button>
        <button id="openOnlyBtn" class="ghost-btn">Open only</button>
        <button id="editModeBtn">Aanpassmodus uit</button>
        <button id="addRowBtn" class="hidden">Nieuwe regel toevoegen</button>
        <span class="mode-hint" id="modeHint">Aanpassmodus staat uit (alleen lezen).</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Status</th>
              <th>Purpose</th>
              <th>Oppas</th>
              <th>Notes</th>
              <th id="actionsHead" class="hidden">Acties</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <div class="sync-actions">
      <button id="signin" disabled>Sign in to Google</button>
      <button id="sync" disabled>Sync to Calendar</button>
    </div>

    <div id="feedbackBackdrop" class="dialog-backdrop" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
      <div class="dialog">
        <h3 id="feedbackTitle">Status</h3>
        <p id="feedbackMessage"></p>
        <pre id="feedbackDetails" class="hidden"></pre>
        <div class="dialog-actions">
          <button id="feedbackClose" class="ghost-btn">Close</button>
        </div>
      </div>
    </div>

    <script>
      const CLIENT_ID = '189015137041-otdlrtmqa7v9c6o7qurfc147hql7nfr0.apps.googleusercontent.com';
      const CALENDAR_ID = 'chipplanner92@gmail.com';
      const SCOPES = 'https://www.googleapis.com/auth/calendar';

      let tokenClient;
      let gapiReady = false;
      let gisReady = false;
      let isAuthenticated = false;
      let syncInProgress = false;

      const data = [
        { id: 1, date: '2026-04-07', status: 'done', sitter: 'Wilma', notes: '' },
        { id: 2, date: '2026-04-09', status: 'done', sitter: 'K&P', notes: '' },
        { id: 3, date: '2026-04-10', status: 'done', sitter: 'Sven', notes: '' },
        { id: 4, date: '2026-04-13', status: 'done', sitter: 'Wilma', notes: '' },
        { id: 5, date: '2026-04-15', status: 'done', sitter: 'Maaike', notes: '' },
        { id: 6, date: '2026-04-16', status: 'done', sitter: 'K&P', notes: '' },
        { id: 7, date: '2026-04-17', status: 'done', sitter: 'Sven', notes: '' },
        { id: 8, date: '2026-04-20', status: 'done', sitter: 'Wilma', notes: '' },
        { id: 9, date: '2026-04-21', status: 'done', sitter: 'Wilma', notes: '' },
        { id: 10, date: '2026-04-22', status: 'done', sitter: 'Maaike', notes: '' },
        { id: 11, date: '2026-04-24', status: 'done', sitter: 'K&P', notes: '' },
        { id: 12, date: '2026-04-29', status: 'done', sitter: 'Maaike', notes: '' },
        { id: 13, date: '2026-04-30', status: 'done', sitter: 'Wilma', notes: '' },
        { id: 14, date: '2026-05-04', status: 'open', sitter: '', notes: '' },
        { id: 15, date: '2026-05-06', status: 'open', sitter: '', notes: '' },
        { id: 16, date: '2026-05-07', status: 'open', sitter: '', notes: '' },
        { id: 17, date: '2026-05-11', status: 'open', sitter: '', notes: '' },
        { id: 18, date: '2026-05-12', status: 'open', sitter: '', notes: '' },
        { id: 19, date: '2026-05-14', status: 'done', sitter: 'K&P', notes: '' },
        { id: 20, date: '2026-05-15', status: 'done', sitter: 'K&P', notes: '' },
        { id: 21, date: '2026-05-16', status: 'done', sitter: 'K&P', notes: '' },
        { id: 22, date: '2026-05-17', status: 'done', sitter: 'K&P', notes: '' }
      ];

      const monthToNumber = {
        Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06',
        Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12'
      };
      const PURPOSE_OPTIONS = ['Walk', 'Play', 'Training', 'Vet', 'Grooming'];
      const currentYear = new Date().getFullYear();

      function normalizeDateValue(value) {
        if (!value) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

        const legacyMatch = value.match(/^[A-Za-z]{3}\s+(\d{1,2})\s+([A-Za-z]{3})$/);
        if (!legacyMatch) return '';

        const day = legacyMatch[1].padStart(2, '0');
        const month = monthToNumber[legacyMatch[2]];
        if (!month) return '';

        return `${currentYear}-${month}-${day}`;
      }

      function formatDateForDisplay(value) {
        if (!value) return '—';
        const parsed = new Date(`${value}T00:00:00`);
        if (Number.isNaN(parsed.getTime())) return value;

        return new Intl.DateTimeFormat('en-GB', {
          weekday: 'short',
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        }).format(parsed).replace(',', '');
      }

      data.forEach(item => {
        item.date = normalizeDateValue(item.date);
        item.purpose = item.purpose || '';
      });

      const tbody = document.getElementById('rows');
      const stats = document.getElementById('stats');
      const statusFilter = document.getElementById('statusFilter');
      const sitterFilter = document.getElementById('sitterFilter');
      const resetBtn = document.getElementById('resetBtn');
      const togglePastBtn = document.getElementById('togglePastBtn');
      const openOnlyBtn = document.getElementById('openOnlyBtn');
      const editModeBtn = document.getElementById('editModeBtn');
      const addRowBtn = document.getElementById('addRowBtn');
      const actionsHead = document.getElementById('actionsHead');
      const modeHint = document.getElementById('modeHint');
      const signinBtn = document.getElementById('signin');
      const syncBtn = document.getElementById('sync');
      const feedbackBackdrop = document.getElementById('feedbackBackdrop');
      const feedbackTitle = document.getElementById('feedbackTitle');
      const feedbackMessage = document.getElementById('feedbackMessage');
      const feedbackDetails = document.getElementById('feedbackDetails');
      const feedbackClose = document.getElementById('feedbackClose');

      let isEditMode = false;
      let showPastDates = false;
      let openOnlyMode = false;

      function startOfToday() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return today;
      }

      function syncOpenOnlyStateWithFilter() {
        openOnlyMode = statusFilter.value === 'open';
        openOnlyBtn.textContent = openOnlyMode ? 'Show all statuses' : 'Open only';
      }

      function showFeedbackDialog({ title, message, details = '' }) {
        feedbackTitle.textContent = title;
        feedbackMessage.textContent = message;
        if (details) {
          feedbackDetails.textContent = details;
          feedbackDetails.classList.remove('hidden');
        } else {
          feedbackDetails.classList.add('hidden');
          feedbackDetails.textContent = '';
        }
        feedbackBackdrop.classList.add('open');
      }

      function closeFeedbackDialog() {
        feedbackBackdrop.classList.remove('open');
      }

      function updateSigninButton() {
        if (isAuthenticated) {
          signinBtn.textContent = 'Signed in ✓';
          signinBtn.classList.add('signin-success');
        } else {
          signinBtn.textContent = 'Sign in to Google';
          signinBtn.classList.remove('signin-success');
        }
      }

      function maybeEnableSignin() {
        if (gapiReady && gisReady) {
          signinBtn.disabled = false;
          updateSigninButton();
        }
      }

      function gapiInit() {
        if (!window.gapi) return;
        window.gapi.load('client', async () => {
          await window.gapi.client.init({
            // Load the Calendar discovery document so gapi.client.calendar is defined
            discoveryDocs: [
              'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'
            ]
            // No apiKey needed – OAuth supplies the credential
          });

          // Extra safety-net: be sure Calendar service is loaded
          await window.gapi.client.load('calendar', 'v3');

          gapiReady = true;
          maybeEnableSignin();
        });
      }

      function gisInit() {
        if (!window.google?.accounts?.oauth2) return;
        tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: (resp) => {
            if (resp.error) {
              isAuthenticated = false;
              syncBtn.disabled = true;
              updateSigninButton();
              showFeedbackDialog({
                title: 'Google sign-in failed',
                message: 'Google did not return an access token, so calendar sync stays disabled.',
                details: `Error: ${resp.error}\n\nTroubleshooting:\n1) Try sign-in again and choose the same Google account that owns ${CALENDAR_ID}.\n2) Make sure third-party cookies/popups are not blocked for this page.\n3) If needed, refresh and retry sign-in.`
              });
              return;
            }
            window.gapi.client.setToken(resp);
            isAuthenticated = true;
            updateSigninButton();
            syncBtn.disabled = false;
            showFeedbackDialog({
              title: 'Sign-in successful',
              message: 'Google authentication succeeded. You can sync to calendar now.'
            });
          }
        });
        gisReady = true;
        maybeEnableSignin();
      }

      function initializeGoogleLibraries() {
        gapiInit();
        gisInit();

        const retryTimer = window.setInterval(() => {
          if (!gapiReady) gapiInit();
          if (!gisReady) gisInit();
          if (gapiReady && gisReady) window.clearInterval(retryTimer);
        }, 350);

        window.setTimeout(() => window.clearInterval(retryTimer), 10000);
      }

      function handleAuth() {
        if (!tokenClient) return;
        showFeedbackDialog({
          title: 'Google sign-in',
          message: 'Opening Google sign-in. Complete the account and consent steps in the popup.'
        });
        tokenClient.requestAccessToken();
      }

      function formatApiError(err) {
        const pieces = [];
        if (!err) return 'Unknown error';
        if (err.result?.error?.code) pieces.push(`Code: ${err.result.error.code}`);
        if (err.result?.error?.message) pieces.push(`Message: ${err.result.error.message}`);
        if (err.status) pieces.push(`HTTP status: ${err.status}`);
        if (err.message) pieces.push(`Error: ${err.message}`);
        if (!pieces.length) {
          try {
            pieces.push(JSON.stringify(err, null, 2));
          } catch (_unused) {
            pieces.push(String(err));
          }
        }
        return pieces.join('\n');
      }

      async function syncNow() {
        if (syncInProgress) return;
        const planEvents = buildPlanEvents();
        const rangeStart = new Date();
        const rangeEnd = new Date(rangeStart);
        rangeEnd.setFullYear(rangeEnd.getFullYear() + 1);
        syncInProgress = true;
        syncBtn.disabled = true;

        showFeedbackDialog({
          title: 'Sync in progress',
          message: `Starting sync for ${planEvents.length} planner events. Please wait...`
        });

        try {
          const deletedCount = await wipeRange(rangeStart, rangeEnd);
          const insertedCount = await insertEvents(planEvents);
          showFeedbackDialog({
            title: 'Sync completed',
            message: `Calendar sync succeeded.`,
            details: `Deleted existing events in range: ${deletedCount}\nInserted events: ${insertedCount}\nCalendar: ${CALENDAR_ID}\nWindow: ${rangeStart.toISOString()} → ${rangeEnd.toISOString()}`
          });
        } catch (err) {
          console.error(err);
          const details = `${formatApiError(err)}\n\nTroubleshooting:\n1) Confirm you are signed in with access to ${CALENDAR_ID}.\n2) If the error code is 401/403, click "Sign in to Google" again.\n3) Verify Calendar API is enabled for this Google Cloud OAuth client.\n4) Check whether browser extensions are blocking Google auth or requests.`;
          showFeedbackDialog({
            title: 'Sync failed',
            message: 'Calendar sync failed. See detailed diagnostics below.',
            details
          });
        } finally {
          syncInProgress = false;
          syncBtn.disabled = !isAuthenticated;
        }
      }

      async function wipeRange(startDate, endDate) {
        let pageToken = null;
        let deletedCount = 0;
        do {
          const resp = await window.gapi.client.calendar.events.list({
            calendarId: CALENDAR_ID,
            timeMin: startDate.toISOString(),
            timeMax: endDate.toISOString(),
            maxResults: 2500,
            pageToken
          });
          const batch = window.gapi.client.newBatch();
          resp.result.items.forEach(ev => {
            batch.add(window.gapi.client.calendar.events.delete({
              calendarId: CALENDAR_ID,
              eventId: ev.id
            }));
            deletedCount += 1;
          });
          if (resp.result.items.length) {
            await executeBatch(batch);
          }
          pageToken = resp.result.nextPageToken;
        } while (pageToken);
        return deletedCount;
      }

      async function insertEvents(events) {
        const batch = window.gapi.client.newBatch();
        events.forEach(ev => {
          batch.add(window.gapi.client.calendar.events.insert({
            calendarId: CALENDAR_ID,
            resource: ev
          }));
        });
        if (events.length) {
          await executeBatch(batch);
        }
        return events.length;
      }

      function executeBatch(batch) {
        return new Promise((resolve, reject) => {
          batch.execute((response) => {
            if (!response) {
              resolve();
              return;
            }

            const responses = Object.values(response);
            const failedResponse = responses.find(item => item?.status && Number(item.status) >= 400);
            if (failedResponse) {
              reject({
                message: failedResponse.body || `Batch request failed with status ${failedResponse.status}`,
                status: failedResponse.status
              });
              return;
            }
            resolve(response);
          });
        });
      }

      function addOneDay(dateStr) {
        const parsed = new Date(`${dateStr}T00:00:00`);
        if (Number.isNaN(parsed.getTime())) return '';
        parsed.setDate(parsed.getDate() + 1);
        return parsed.toISOString().slice(0, 10);
      }

      function buildPlanEvents() {
        return [...tbody.querySelectorAll('tr')]
          .map(row => {
            const rowId = Number(row.dataset.id);
            const item = data.find(entry => entry.id === rowId);
            if (!item || !item.date) return null;

            const endDate = addOneDay(item.date);
            if (!endDate) return null;

            const sitterText = item.sitter || 'Unassigned';
            const summary = item.sitter
              ? `Chip opas: ${sitterText}`
              : 'Problem chip: Unassigned';
            const statusText = item.status === 'done' ? 'done' : 'open';
            const purposeText = item.purpose || 'General';
            const notesText = item.notes ? `Notes: ${item.notes}` : 'Notes: —';

            return {
              summary,
              start: { date: item.date },
              end: { date: endDate },
              description: `Status: ${statusText}\nPurpose: ${purposeText}\n${notesText}`
            };
          })
          .filter(Boolean);
      }

      function refreshSitterFilterOptions() {
        const current = sitterFilter.value;
        const sitters = [...new Set(data.map(d => d.sitter).filter(Boolean))].sort();

        sitterFilter.innerHTML = '<option value="all">All</option>';
        sitters.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          sitterFilter.appendChild(opt);
        });

        sitterFilter.value = sitters.includes(current) || current === 'all' ? current : 'all';
      }

      function renderStats(list) {
        const done = list.filter(item => item.status === 'done').length;
        const open = list.filter(item => item.status === 'open').length;
        stats.innerHTML = `
          <div class="stat"><small>Total</small><strong>${list.length}</strong></div>
          <div class="stat"><small>Regeld</small><strong>${done}</strong></div>
          <div class="stat"><small>Open</small><strong>${open}</strong></div>
        `;
      }

      function renderDisplayRow(item) {
        return `
          <tr data-id="${item.id}">
            <td data-label="Date">${formatDateForDisplay(item.date)}</td>
            <td data-label="Status"><span class="status ${item.status}">${item.status === 'done' ? '✅ geregeld' : '❌ open'}</span></td>
            <td data-label="Purpose">${item.purpose || '—'}</td>
            <td data-label="Oppas">${item.sitter || '—'}</td>
            <td data-label="Notes" class="notes">${item.notes || '—'}</td>
          </tr>
        `;
      }

      function getPurposeOptions() {
        return [...new Set([
          ...PURPOSE_OPTIONS,
          ...data.map(item => item.purpose).filter(Boolean)
        ])].sort((a, b) => a.localeCompare(b));
      }

      function renderPurposeSelect(item) {
        const options = getPurposeOptions();
        const optionTags = options
          .map(option => `<option value="${option}" ${item.purpose === option ? 'selected' : ''}>${option}</option>`)
          .join('');

        return `
          <select class="edit-select" data-field="purpose">
            <option value="" ${!item.purpose ? 'selected' : ''}>—</option>
            ${optionTags}
            <option value="__add_new__">+ Add new…</option>
          </select>
        `;
      }

      function renderEditRow(item) {
        return `
          <tr data-id="${item.id}">
            <td data-label="Date"><input class="edit-input" data-field="date" type="date" value="${item.date}" /></td>
            <td data-label="Status">
              <select class="edit-select" data-field="status">
                <option value="open" ${item.status === 'open' ? 'selected' : ''}>open</option>
                <option value="done" ${item.status === 'done' ? 'selected' : ''}>done</option>
              </select>
            </td>
            <td data-label="Purpose">${renderPurposeSelect(item)}</td>
            <td data-label="Oppas"><input class="edit-input" data-field="sitter" type="text" value="${item.sitter}" /></td>
            <td data-label="Notes"><input class="edit-input" data-field="notes" type="text" value="${item.notes}" /></td>
            <td data-label="Acties"><button class="delete-btn" data-action="delete">Verwijderen</button></td>
          </tr>
        `;
      }

      function getFilteredData() {
        return data
          .filter(item => {
            if (!showPastDates) {
              const rowDate = new Date(`${item.date}T00:00:00`);
              if (!Number.isNaN(rowDate.getTime()) && rowDate < startOfToday()) {
                return false;
              }
            }

            const statusOk = statusFilter.value === 'all' || item.status === statusFilter.value;
            const sitterOk = sitterFilter.value === 'all' || item.sitter === sitterFilter.value;
            return statusOk && sitterOk;
          })
          .sort((a, b) => a.date.localeCompare(b.date));
      }

      function renderRows() {
        const filtered = getFilteredData();
        tbody.innerHTML = filtered.map(item => isEditMode ? renderEditRow(item) : renderDisplayRow(item)).join('');
        renderStats(filtered);
      }

      function toggleEditMode() {
        isEditMode = !isEditMode;
        editModeBtn.textContent = isEditMode ? 'Aanpassmodus aan' : 'Aanpassmodus uit';
        editModeBtn.classList.toggle('edit-mode-active', isEditMode);
        addRowBtn.classList.toggle('hidden', !isEditMode);
        actionsHead.classList.toggle('hidden', !isEditMode);
        modeHint.textContent = isEditMode
          ? 'Aanpassmodus staat aan (direct bewerken mogelijk).'
          : 'Aanpassmodus staat uit (alleen lezen).';
        renderRows();
      }

      function updateItem(id, field, value) {
        const item = data.find(row => row.id === id);
        if (!item) return;

        item[field] = value;
      }

      function addNewRow() {
        const nextId = data.reduce((max, row) => Math.max(max, row.id), 0) + 1;
        data.push({
          id: nextId,
          date: new Date().toISOString().slice(0, 10),
          status: 'open',
          purpose: '',
          sitter: '',
          notes: ''
        });
        refreshSitterFilterOptions();
        renderRows();
      }

      function deleteRow(id) {
        const index = data.findIndex(row => row.id === id);
        if (index === -1) return;
        data.splice(index, 1);
        refreshSitterFilterOptions();
        renderRows();
      }

      function confirmDeleteRow(id) {
        const row = data.find(item => item.id === id);
        if (!row) return false;

        const rowLabel = `${formatDateForDisplay(row.date)}${row.sitter ? ` (${row.sitter})` : ''}`;
        const firstConfirmation = window.confirm(`Weet je zeker dat je deze regel wilt verwijderen?\n${rowLabel}`);
        if (!firstConfirmation) return false;

        return window.confirm('Laatste check: weet je écht zeker dat je deze regel definitief wilt verwijderen?');
      }

      tbody.addEventListener('input', event => {
        if (!isEditMode) return;

        const target = event.target;
        const row = target.closest('tr');
        if (!row) return;

        const id = Number(row.dataset.id);
        const field = target.dataset.field;
        if (!field || Number.isNaN(id)) return;

        updateItem(id, field, target.value);

        if (field === 'sitter') {
          refreshSitterFilterOptions();
        }

        renderStats(getFilteredData());
      });

      tbody.addEventListener('change', event => {
        if (!isEditMode) return;

        const target = event.target;
        if (target.dataset.field !== 'purpose') return;

        const row = target.closest('tr');
        if (!row) return;
        const id = Number(row.dataset.id);
        if (Number.isNaN(id)) return;

        if (target.value === '__add_new__') {
          const customPurpose = window.prompt('Type a new purpose value:');
          if (!customPurpose || !customPurpose.trim()) {
            const item = data.find(entry => entry.id === id);
            target.value = item?.purpose || '';
            return;
          }

          updateItem(id, 'purpose', customPurpose.trim());
          renderRows();
          return;
        }

        updateItem(id, 'purpose', target.value);
      });

      tbody.addEventListener('click', event => {
        if (!isEditMode) return;

        const button = event.target.closest('button[data-action="delete"]');
        if (!button) return;

        const row = button.closest('tr');
        if (!row) return;

        const id = Number(row.dataset.id);
        if (Number.isNaN(id)) return;
        if (!confirmDeleteRow(id)) return;
        deleteRow(id);
      });

      statusFilter.addEventListener('change', renderRows);
      sitterFilter.addEventListener('change', renderRows);
      resetBtn.addEventListener('click', () => {
        statusFilter.value = 'all';
        sitterFilter.value = 'all';
        openOnlyMode = false;
        openOnlyBtn.textContent = 'Open only';
        showPastDates = false;
        togglePastBtn.textContent = 'Show past dates';
        renderRows();
      });
      togglePastBtn.addEventListener('click', () => {
        showPastDates = !showPastDates;
        togglePastBtn.textContent = showPastDates ? 'Hide past dates' : 'Show past dates';
        renderRows();
      });
      openOnlyBtn.addEventListener('click', () => {
        openOnlyMode = !openOnlyMode;
        statusFilter.value = openOnlyMode ? 'open' : 'all';
        syncOpenOnlyStateWithFilter();
        renderRows();
      });
      statusFilter.addEventListener('change', syncOpenOnlyStateWithFilter);
      editModeBtn.addEventListener('click', toggleEditMode);
      addRowBtn.addEventListener('click', addNewRow);
      signinBtn.addEventListener('click', handleAuth);
      syncBtn.addEventListener('click', syncNow);
      feedbackClose.addEventListener('click', closeFeedbackDialog);
      feedbackBackdrop.addEventListener('click', event => {
        if (event.target === feedbackBackdrop) closeFeedbackDialog();
      });

      refreshSitterFilterOptions();
      syncOpenOnlyStateWithFilter();
      renderRows();
      initializeGoogleLibraries();
    </script>
  </body>
</html>
